services:
  message-hub:
    build: .
    labels:
      org.opencontainers.image.title: "Message Hub"
      org.opencontainers.image.description: "Self-hosted message aggregation and booking triage hub with modular connectors."
      org.opencontainers.image.icon: "http://192.168.50.230:3000/app-icon.svg"
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data        # DB persists here on the host
    environment:
      - PORT=3000
    restart: unless-stopped
