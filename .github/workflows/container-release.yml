name: Release Container

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish. Must match VERSION."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: message-hub

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve release version
        id: release
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          python <<'PY'
          import json
          import os
          from pathlib import Path

          version = Path("VERSION").read_text(encoding="utf-8").strip()
          deployment = json.loads(Path("truenas-deployment.json").read_text(encoding="utf-8"))
          package = json.loads(Path("package.json").read_text(encoding="utf-8"))

          if deployment["version"] != version:
              raise SystemExit(f"truenas-deployment.json version {deployment['version']} does not match VERSION {version}")

          if package["version"] != version:
              raise SystemExit(f"package.json version {package['version']} does not match VERSION {version}")

          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          requested = os.environ.get("INPUT_VERSION", "").strip()

          if requested:
              release_version = requested
          elif ref_name.startswith("v"):
              release_version = ref_name[1:]
          else:
              release_version = version

          if release_version != version:
              raise SystemExit(f"release version {release_version} does not match VERSION {version}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"version={release_version}\n")
              handle.write(f"image=ghcr.io/{os.environ['GITHUB_REPOSITORY_OWNER']}/message-hub\n")
          PY

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.release.outputs.image }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Release summary
        run: |
          echo "Published ${{ steps.release.outputs.image }}:${{ steps.release.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Published ${{ steps.release.outputs.image }}:latest" >> "$GITHUB_STEP_SUMMARY"

  deploy-truenas:
    needs: release
    if: ${{ vars.TRUENAS_HOST != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRUENAS_API_KEY: ${{ secrets.TRUENAS_API_KEY }}
      TRUENAS_HOST: ${{ vars.TRUENAS_HOST }}
      TRUENAS_APP_ID: ${{ vars.TRUENAS_APP_ID }}
      TRUENAS_SERVICE_NAME: ${{ vars.TRUENAS_SERVICE_NAME }}
      TRUENAS_PUBLIC_URL: ${{ vars.TRUENAS_PUBLIC_URL }}
      TRUENAS_HOST_PATH: ${{ vars.TRUENAS_HOST_PATH }}
      TRUENAS_PRESERVE_DATA_PATH: ${{ vars.TRUENAS_PRESERVE_DATA_PATH }}
      TRUENAS_REGISTRY_NAME: GitHub Container Registry
      TRUENAS_REGISTRY_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      TRUENAS_REGISTRY_PASSWORD: ${{ secrets.GHCR_PULL_TOKEN }}
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      TAILSCALE_TAGS: ${{ vars.TAILSCALE_TAGS }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check deploy prerequisites
        id: prereqs
        shell: bash
        run: |
          if [ -z "${TRUENAS_API_KEY:-}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping TrueNAS deploy because TRUENAS_API_KEY is not set." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ -n "${TAILSCALE_TAGS:-}" ]; then
            echo "tailscale_tags=${TAILSCALE_TAGS}" >> "$GITHUB_OUTPUT"
          else
            echo "tailscale_tags=tag:ci" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${TRUENAS_HOST:-}" == *.ts.net ]]; then
            echo "needs_tailscale=true" >> "$GITHUB_OUTPUT"
            if [ -n "${TS_OAUTH_CLIENT_ID:-}" ] && [ -n "${TS_OAUTH_SECRET:-}" ]; then
              echo "tailscale_auth_mode=oauth" >> "$GITHUB_OUTPUT"
            elif [ -n "${TAILSCALE_AUTHKEY:-}" ]; then
              echo "tailscale_auth_mode=authkey" >> "$GITHUB_OUTPUT"
            else
              echo "ready=false" >> "$GITHUB_OUTPUT"
              echo "Skipping TrueNAS deploy because ${TRUENAS_HOST} is a Tailscale host and no TS_OAUTH_CLIENT_ID/TS_OAUTH_SECRET or TAILSCALE_AUTHKEY secret is configured." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
          else
            echo "needs_tailscale=false" >> "$GITHUB_OUTPUT"
            echo "tailscale_auth_mode=none" >> "$GITHUB_OUTPUT"
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Join Tailscale with OAuth client
        if: ${{ steps.prereqs.outputs.ready == 'true' && steps.prereqs.outputs.needs_tailscale == 'true' && steps.prereqs.outputs.tailscale_auth_mode == 'oauth' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: ${{ steps.prereqs.outputs.tailscale_tags }}
          ping: ${{ env.TRUENAS_HOST }}

      - name: Join Tailscale with auth key fallback
        if: ${{ steps.prereqs.outputs.ready == 'true' && steps.prereqs.outputs.needs_tailscale == 'true' && steps.prereqs.outputs.tailscale_auth_mode == 'authkey' }}
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          ping: ${{ env.TRUENAS_HOST }}

      - name: Update TrueNAS app
        if: ${{ steps.prereqs.outputs.ready == 'true' }}
        run: node scripts/truenas-deploy.js

      - name: Deploy summary
        if: ${{ steps.prereqs.outputs.ready == 'true' }}
        run: |
          echo "TrueNAS deploy attempted for tag ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
