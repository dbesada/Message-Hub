name: Release Container

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish. Must match VERSION."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: message-hub

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve release version
        id: release
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          python <<'PY'
          import json
          import os
          from pathlib import Path

          version = Path("VERSION").read_text(encoding="utf-8").strip()
          deployment = json.loads(Path("truenas-deployment.json").read_text(encoding="utf-8"))
          package = json.loads(Path("package.json").read_text(encoding="utf-8"))

          if deployment["version"] != version:
              raise SystemExit(f"truenas-deployment.json version {deployment['version']} does not match VERSION {version}")

          if package["version"] != version:
              raise SystemExit(f"package.json version {package['version']} does not match VERSION {version}")

          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          requested = os.environ.get("INPUT_VERSION", "").strip()

          if requested:
              release_version = requested
          elif ref_name.startswith("v"):
              release_version = ref_name[1:]
          else:
              release_version = version

          if release_version != version:
              raise SystemExit(f"release version {release_version} does not match VERSION {version}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"version={release_version}\n")
              handle.write(f"image=ghcr.io/{os.environ['GITHUB_REPOSITORY_OWNER']}/message-hub\n")
          PY

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.release.outputs.image }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Release summary
        run: |
          echo "Published ${{ steps.release.outputs.image }}:${{ steps.release.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Published ${{ steps.release.outputs.image }}:latest" >> "$GITHUB_STEP_SUMMARY"

  deploy-truenas:
    needs: release
    if: ${{ vars.TRUENAS_HOST != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TRUENAS_API_KEY: ${{ secrets.TRUENAS_API_KEY }}
      TRUENAS_HOST: ${{ vars.TRUENAS_HOST }}
      TRUENAS_APP_ID: ${{ vars.TRUENAS_APP_ID }}
      TRUENAS_SERVICE_NAME: ${{ vars.TRUENAS_SERVICE_NAME }}
      TRUENAS_PUBLIC_URL: ${{ vars.TRUENAS_PUBLIC_URL }}
      TRUENAS_HOST_PATH: ${{ vars.TRUENAS_HOST_PATH }}
      TRUENAS_PRESERVE_DATA_PATH: ${{ vars.TRUENAS_PRESERVE_DATA_PATH }}
      TRUENAS_REGISTRY_NAME: GitHub Container Registry
      TRUENAS_REGISTRY_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      TRUENAS_REGISTRY_PASSWORD: ${{ secrets.GHCR_PULL_TOKEN }}
      TS_OIDC_CLIENT_ID: ${{ secrets.TS_OIDC_CLIENT_ID }}
      TS_OIDC_AUDIENCE: ${{ secrets.TS_OIDC_AUDIENCE }}
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      TAILSCALE_AUTH_MODE: ${{ vars.TAILSCALE_AUTH_MODE }}
      TAILSCALE_TAGS: ${{ vars.TAILSCALE_TAGS }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check deploy prerequisites
        id: prereqs
        shell: bash
        run: |
          auth_mode="$(printf '%s' "${TAILSCALE_AUTH_MODE:-auto}" | tr '[:upper:]' '[:lower:]')"
          if [[ "$auth_mode" != "auto" && "$auth_mode" != "authkey" && "$auth_mode" != "oauth" && "$auth_mode" != "oidc" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping TrueNAS deploy because TAILSCALE_AUTH_MODE must be auto, authkey, oauth, or oidc." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ -z "${TRUENAS_API_KEY:-}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping TrueNAS deploy because TRUENAS_API_KEY is not set." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ -n "${TAILSCALE_TAGS:-}" ]; then
            normalized_tags="$(printf '%s' "${TAILSCALE_TAGS}" | tr '[:upper:]' '[:lower:]')"
            echo "tailscale_tags=${normalized_tags}" >> "$GITHUB_OUTPUT"
          else
            echo "tailscale_tags=" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${TRUENAS_HOST:-}" == *.ts.net ]]; then
            echo "needs_tailscale=true" >> "$GITHUB_OUTPUT"
            selected_mode=""
            if [[ "$auth_mode" == "oidc" ]]; then
              selected_mode="oidc"
            elif [[ "$auth_mode" == "oauth" ]]; then
              selected_mode="oauth"
            elif [[ "$auth_mode" == "authkey" ]]; then
              selected_mode="authkey"
            elif [ -n "${TAILSCALE_AUTHKEY:-}" ]; then
              selected_mode="authkey"
            elif [ -n "${TS_OIDC_CLIENT_ID:-}" ] && [ -n "${TS_OIDC_AUDIENCE:-}" ]; then
              selected_mode="oidc"
            elif [ -n "${TS_OAUTH_CLIENT_ID:-}" ] && [ -n "${TS_OAUTH_SECRET:-}" ]; then
              selected_mode="oauth"
            fi
            if [[ "$selected_mode" == "oidc" ]]; then
              if [ -z "${TS_OIDC_CLIENT_ID:-}" ] || [ -z "${TS_OIDC_AUDIENCE:-}" ]; then
                echo "ready=false" >> "$GITHUB_OUTPUT"
                echo "Skipping TrueNAS deploy because TAILSCALE_AUTH_MODE=oidc but TS_OIDC_CLIENT_ID/TS_OIDC_AUDIENCE are not both configured." >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              if [ -z "${TAILSCALE_TAGS:-}" ]; then
                echo "ready=false" >> "$GITHUB_OUTPUT"
                echo "Skipping TrueNAS deploy because TAILSCALE_AUTH_MODE=oidc requires TAILSCALE_TAGS to be set to a permitted lowercase tag such as tag:codex." >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
            elif [[ "$selected_mode" == "oauth" ]]; then
              if [ -z "${TS_OAUTH_CLIENT_ID:-}" ] || [ -z "${TS_OAUTH_SECRET:-}" ]; then
                echo "ready=false" >> "$GITHUB_OUTPUT"
                echo "Skipping TrueNAS deploy because TAILSCALE_AUTH_MODE=oauth but TS_OAUTH_CLIENT_ID/TS_OAUTH_SECRET are not both configured." >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              if [ -z "${TAILSCALE_TAGS:-}" ]; then
                echo "ready=false" >> "$GITHUB_OUTPUT"
                echo "Skipping TrueNAS deploy because TAILSCALE_AUTH_MODE=oauth requires TAILSCALE_TAGS to be set to a permitted lowercase tag such as tag:codex." >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
            elif [[ "$selected_mode" == "authkey" ]]; then
              if [ -z "${TAILSCALE_AUTHKEY:-}" ]; then
                echo "ready=false" >> "$GITHUB_OUTPUT"
                echo "Skipping TrueNAS deploy because TAILSCALE_AUTH_MODE=authkey but TAILSCALE_AUTHKEY is not configured." >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
            else
              echo "ready=false" >> "$GITHUB_OUTPUT"
              echo "Skipping TrueNAS deploy because ${TRUENAS_HOST} is a Tailscale host and neither a usable TAILSCALE_AUTHKEY nor TS_OAUTH_CLIENT_ID/TS_OAUTH_SECRET pair is configured." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "tailscale_auth_mode=${selected_mode}" >> "$GITHUB_OUTPUT"
          else
            echo "needs_tailscale=false" >> "$GITHUB_OUTPUT"
            echo "tailscale_auth_mode=none" >> "$GITHUB_OUTPUT"
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Join Tailscale with OpenID Connect
        if: ${{ steps.prereqs.outputs.ready == 'true' && steps.prereqs.outputs.needs_tailscale == 'true' && steps.prereqs.outputs.tailscale_auth_mode == 'oidc' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OIDC_CLIENT_ID }}
          audience: ${{ env.TS_OIDC_AUDIENCE }}
          tags: ${{ steps.prereqs.outputs.tailscale_tags }}
          ping: ${{ env.TRUENAS_HOST }}

      - name: Join Tailscale with OAuth client
        if: ${{ steps.prereqs.outputs.ready == 'true' && steps.prereqs.outputs.needs_tailscale == 'true' && steps.prereqs.outputs.tailscale_auth_mode == 'oauth' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: ${{ steps.prereqs.outputs.tailscale_tags }}
          ping: ${{ env.TRUENAS_HOST }}

      - name: Join Tailscale with auth key fallback
        if: ${{ steps.prereqs.outputs.ready == 'true' && steps.prereqs.outputs.needs_tailscale == 'true' && steps.prereqs.outputs.tailscale_auth_mode == 'authkey' }}
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}
          ping: ${{ env.TRUENAS_HOST }}

      - name: Update TrueNAS app
        if: ${{ steps.prereqs.outputs.ready == 'true' }}
        run: node scripts/truenas-deploy.js

      - name: Deploy summary
        if: ${{ steps.prereqs.outputs.ready == 'true' }}
        run: |
          echo "TrueNAS deploy attempted for tag ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tailscale auth mode: ${{ steps.prereqs.outputs.tailscale_auth_mode }}" >> "$GITHUB_STEP_SUMMARY"
